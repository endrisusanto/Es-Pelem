<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #0b0f19;
      color: #f3f4f6;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-connected {
      background-color: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .badge-disconnected {
      background-color: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .info-box {
      background-color: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
    }
    .info-title {
      font-weight: bold;
      color: #9ca3af;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    .info-value {
      color: #f3f4f6;
      font-family: monospace;
      word-break: break-all;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #374151;
      cursor: not-allowed;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <h3>SSCM Interceptor</h3>
  
  <div class="status-row">
    <span>Tauri Client:</span>
    <span id="tauri-status" class="badge badge-disconnected">Checking...</span>
  </div>

  <div class="info-box">
    <div class="info-title">Last Intercepted Request</div>
    <div id="request-url" class="info-value">None (Browse SSCM page to capture)</div>
  </div>

  <div class="info-box">
    <div class="info-title">Firmware Details captured</div>
    <div id="captured-count" class="info-value">0 releases</div>
  </div>

  <button id="copy-btn" disabled>Copy JSON Response</button>
  <button id="sync-btn" style="margin-top: 8px;" disabled>Resync to Tauri</button>
</body>
</html>
